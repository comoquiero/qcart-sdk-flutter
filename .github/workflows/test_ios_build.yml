name: Test iOS Plugin Build

on:
  workflow_dispatch: 

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Descargar el código del plugin
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar dependencias del ejemplo
        run: |
          cd example
          flutter pub get

      - name: Verificar integridad del XCFramework (Anti-Falsos Positivos)
        run: |
          echo "🔍 Inspeccionando QcartSDK.xcframework..."
          
          FRAMEWORK_PATH="ios/QcartSDK.xcframework"
          
          # 1. Revisar dispositivo físico (ARM64)
          if [ ! -d "$FRAMEWORK_PATH/ios-arm64/QcartSDK.framework/Modules" ]; then
            echo "❌ ERROR: Falta la carpeta Modules en ios-arm64."
            echo "El cliente verá el error 'Unable to resolve module dependency'."
            exit 1
          fi

          # 2. Revisar simulador
          if [ ! -d "$FRAMEWORK_PATH/ios-arm64_x86_64-simulator/QcartSDK.framework/Modules" ]; then
            echo "❌ ERROR: Falta la carpeta Modules en el simulador."
            echo "El cliente verá el error 'Unable to resolve module dependency'."
            exit 1
          fi

          echo "✅ ÉXITO: El XCFramework está completo y contiene las interfaces de Swift."

      - name: Compilar app de ejemplo para iOS
        run: |
          cd example
          # flutter build ios --no-codesign --simulator
          flutter build ios --no-codesign --release

      - name: Subir la App de Ejemplo (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: App-Ejemplo-iOS
          # Esta es la ruta estándar donde Flutter deja el ejecutable del simulador
          path: example/build/ios/iphonesimulator/Runner.app
          # Opcional: Si Appetize te pide un .zip, puedes comprimirlo antes o
          # simplemente subir la carpeta .app y GitHub la zipeará automáticamente.