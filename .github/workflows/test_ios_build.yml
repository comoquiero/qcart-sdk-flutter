name: Test iOS Plugin Build

on:
  workflow_dispatch: # Para correrlo manualmente

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Descargar el código del plugin
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar dependencias del ejemplo
        run: |
          cd example
          flutter pub get

      - name: Compilar app de ejemplo para iOS
        # Usamos --no-codesign porque no tenemos certificados de Apple configurados en esta Mac virtual
        run: |
          cd example
          flutter build ios --no-codesign --simulator