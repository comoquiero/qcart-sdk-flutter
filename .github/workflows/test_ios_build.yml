name: Test iOS Plugin Build

on:
  workflow_dispatch: 

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get example dependencies
        run: |
          cd example
          flutter pub get

      - name: Verify XCFramework integrity (Anti-False Positives)
        run: |
          echo "🔍 Inspecting QcartSDK.xcframework..."
          
          FRAMEWORK_PATH="ios/QcartSDK.xcframework"
          
          # 1. Check physical device (ARM64)
          if [ ! -d "$FRAMEWORK_PATH/ios-arm64/QcartSDK.framework/Modules" ]; then
            echo "❌ ERROR: Modules folder is missing in ios-arm64."
            echo "The client will see the error 'Unable to resolve module dependency'."
            exit 1
          fi

          # 2. Check simulator
          if [ ! -d "$FRAMEWORK_PATH/ios-arm64_x86_64-simulator/QcartSDK.framework/Modules" ]; then
            echo "❌ ERROR: Modules folder is missing in the simulator."
            echo "The client will see the error 'Unable to resolve module dependency'."
            exit 1
          fi

          echo "✅ SUCCESS: The XCFramework is complete and contains the Swift interfaces."

      - name: Verify app builds for Production (Physical Device)
        run: |
          cd example
          # This catches AOT, ARM64, and Code Stripping errors
          flutter build ios --no-codesign --release

      - name: Build example app for Simulator
        run: |
          cd example
          # This generates the binary that will be uploaded in the next step
          flutter build ios --no-codesign --simulator

      - name: Upload Example App (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Example-App
          # This is the standard path where Flutter outputs the simulator executable
          path: example/build/ios/iphonesimulator/Runner.app
          # Optional: If Appetize requires a .zip, you can compress it first or
          # just upload the .app folder and GitHub will zip it automatically.